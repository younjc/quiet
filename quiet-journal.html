<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiet — a private journal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root,[data-theme="warm-dark"]{
    --bg:#1C1A17; --surface:#252320; --surface-2:#2D2A26;
    --accent:#7A9E7E; --accent-dim:#5e7a62;
    --danger:#C47A7A; --danger-dim:#9a5f5f;
    --text:#E8E4DC; --text-2:#8C8880; --line:#332F2A;
    --radius:8px;
    --shadow:0 1px 3px rgba(0,0,0,.35), 0 6px 18px rgba(0,0,0,.22);
    --serif: Georgia, 'Palatino Linotype', 'Book Antiqua', serif;
    --ui: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  [data-theme="light"]{
    --bg:#F5F2ED; --surface:#FFFFFF; --surface-2:#EDE9E3;
    --accent:#5A8060; --accent-dim:#406050;
    --danger:#B05050; --danger-dim:#8a3d3d;
    --text:#2C2A26; --text-2:#7A766E; --line:#D9D4CC;
    --shadow:0 1px 3px rgba(0,0,0,.08), 0 4px 14px rgba(0,0,0,.07);
  }
  [data-theme="cool-dark"]{
    --bg:#141820; --surface:#1C2130; --surface-2:#242C3E;
    --accent:#7AA0C4; --accent-dim:#5a7fa8;
    --danger:#C47A9E; --danger-dim:#9a5f7e;
    --text:#DDE3EE; --text-2:#7A8898; --line:#2A3248;
    --shadow:0 1px 3px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.3);
  }
  [data-theme="forest"]{
    --bg:#121A14; --surface:#192210; --surface-2:#1F2B18;
    --accent:#90C87A; --accent-dim:#6a9a56;
    --danger:#E09060; --danger-dim:#b06a40;
    --text:#D8EDCC; --text-2:#7A9868; --line:#243018;
    --shadow:0 1px 3px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.3);
  }
  [data-theme="sakura"]{
    --bg:#FDF0F4; --surface:#FFFFFF; --surface-2:#FAE4EC;
    --accent:#D4689A; --accent-dim:#b04d7e;
    --danger:#C04848; --danger-dim:#9a3333;
    --text:#3A1F2A; --text-2:#9A6880; --line:#F0C8D8;
    --shadow:0 1px 4px rgba(180,100,130,.1), 0 4px 16px rgba(180,100,130,.08);
  }
  [data-theme="tiffany"]{
    --bg:#EDF8F9; --surface:#FFFFFF; --surface-2:#D4EFF2;
    --accent:#2AABB0; --accent-dim:#1d878c;
    --danger:#C04848; --danger-dim:#9a3333;
    --text:#1A3335; --text-2:#5A8A8E; --line:#B8E0E4;
    --shadow:0 1px 4px rgba(40,160,170,.1), 0 4px 16px rgba(40,160,170,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--ui);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:rgba(122,158,126,.3)}
  [data-theme="sakura"] ::selection{background:rgba(212,104,154,.25)}
  [data-theme="tiffany"] ::selection{background:rgba(42,171,176,.25)}
  a{color:var(--accent)}
  button{font-family:inherit}

  /* ---------- Layout ---------- */
  #app{display:flex;min-height:100vh}
  #sidebar{
    width:212px;flex:0 0 212px;
    background:var(--surface);
    padding:20px 12px;
    display:flex;flex-direction:column;gap:4px;
    position:sticky;top:0;height:100vh;
    border-right:1px solid var(--line);
  }
  .brand{
    font-family:var(--serif);font-size:21px;
    padding:6px 12px 18px;letter-spacing:.3px;
    color:var(--text);
  }
  .brand small{display:block;font-family:var(--ui);font-size:11px;color:var(--text-2);letter-spacing:.5px;font-weight:400;margin-top:2px}
  .nav-item{
    display:flex;align-items:center;gap:11px;
    padding:9px 12px;border-radius:6px;cursor:pointer;
    color:var(--text-2);border-left:2px solid transparent;
    user-select:none;transition:background .12s,color .12s;
    font-size:14px;
  }
  .nav-item .ico{width:18px;text-align:center;font-size:15px;flex:0 0 18px}
  .nav-item:hover{background:var(--surface-2);color:var(--text)}
  .nav-item.active{
    color:var(--text);background:var(--surface-2);
    border-left:2px solid var(--accent);
  }
  .nav-spacer{flex:1}
  .nav-item.subtle{font-size:13px}

  #main{flex:1;min-width:0;padding:30px 34px 80px;max-width:1100px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  h1.page{font-family:var(--serif);font-weight:500;font-size:27px;margin:0 0 4px}
  .page-sub{color:var(--text-2);font-size:13px;margin:0 0 24px}

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 20px;margin-bottom:18px;
  }
  .card h2{font-family:var(--serif);font-weight:500;font-size:18px;margin:0 0 14px}
  .card h3{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-2);margin:0 0 10px;font-weight:600}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .row>*{flex:1;min-width:0}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .muted{color:var(--text-2)}
  .small{font-size:12.5px}
  .center{text-align:center}

  /* ---------- Controls ---------- */
  label.fld{display:block;font-size:12px;color:var(--text-2);margin:0 0 5px;letter-spacing:.3px}
  input[type=text],input[type=date],input[type=number],select,textarea{
    width:100%;background:var(--bg);color:var(--text);
    border:1px solid var(--line);border-radius:6px;
    padding:9px 11px;font-family:var(--ui);font-size:14px;outline:none;
    transition:border-color .12s;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--accent-dim)}
  /* light themes: make sure inputs/editors match light bg */
  [data-theme="sakura"] input,[data-theme="sakura"] select,[data-theme="sakura"] textarea,[data-theme="sakura"] .editor{background:var(--surface-2);color:var(--text);border-color:var(--line)}
  [data-theme="tiffany"] input,[data-theme="tiffany"] select,[data-theme="tiffany"] textarea,[data-theme="tiffany"] .editor{background:var(--surface-2);color:var(--text);border-color:var(--line)}
  [data-theme="light"] input,[data-theme="light"] select,[data-theme="light"] textarea,[data-theme="light"] .editor{background:var(--surface-2);color:var(--text);border-color:var(--line)}
  textarea{resize:vertical;min-height:64px}
  .field{margin-bottom:13px}
  .inline-fields{display:flex;gap:12px;flex-wrap:wrap}
  .inline-fields>.field{flex:1;min-width:120px;margin-bottom:13px}

  button.btn{
    background:var(--accent);color:#15201a;border:none;border-radius:6px;
    padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer;
    transition:filter .12s,transform .05s;letter-spacing:.2px;
  }
  button.btn:hover{filter:brightness(1.08)}
  button.btn:active{transform:translateY(1px)}
  button.btn.ghost{background:transparent;color:var(--text-2);border:1px solid var(--line)}
  button.btn.ghost:hover{color:var(--text);border-color:var(--text-2);filter:none}
  button.btn.danger{background:transparent;color:var(--danger);border:1px solid var(--danger-dim)}
  button.btn.danger:hover{background:rgba(196,122,122,.1);filter:none}
  button.btn.sm{padding:5px 11px;font-size:12.5px}
  button.btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  .pill{
    display:inline-block;padding:3px 9px;border-radius:99px;font-size:11.5px;
    background:var(--surface-2);color:var(--text-2);letter-spacing:.2px;
  }
  .pill.accent{background:rgba(122,158,126,.16);color:var(--accent)}
  .pill.danger{background:rgba(196,122,122,.16);color:var(--danger)}

  /* dot scale */
  .dots{display:inline-flex;gap:3px;align-items:center;vertical-align:middle}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .dot.on{background:var(--accent)}
  .dot.danger.on{background:var(--danger)}
  .scoreline{display:flex;align-items:center;gap:9px}
  .scoreline .num{font-family:var(--serif);font-size:15px;color:var(--text)}

  /* chips / checkboxes */
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    padding:6px 12px;border-radius:99px;border:1px solid var(--line);
    cursor:pointer;font-size:13px;color:var(--text-2);user-select:none;transition:all .12s;
  }
  .chip:hover{border-color:var(--text-2)}
  .chip.on{background:rgba(122,158,126,.16);border-color:var(--accent-dim);color:var(--accent)}

  /* lists */
  .list-item{
    padding:13px 0;border-bottom:1px solid var(--line);
  }
  .list-item:last-child{border-bottom:none}
  .entry-body{font-family:var(--serif);font-size:15.5px;line-height:1.65;color:var(--text)}
  .entry-meta{font-size:12px;color:var(--text-2);margin-bottom:6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}

  /* rich editor */
  .editor-toolbar{display:flex;gap:6px;margin-bottom:8px}
  .editor-toolbar button{
    background:var(--surface-2);border:1px solid var(--line);color:var(--text-2);
    width:32px;height:30px;border-radius:5px;cursor:pointer;font-size:14px;
  }
  .editor-toolbar button:hover{color:var(--text);border-color:var(--text-2)}
  .editor{
    min-height:150px;background:var(--bg);border:1px solid var(--line);border-radius:6px;
    padding:14px 16px;font-family:var(--serif);font-size:16px;line-height:1.7;outline:none;color:var(--text);
  }
  .editor:focus{border-color:var(--accent-dim)}
  .editor:empty:before{content:attr(data-ph);color:var(--text-2)}
  .editor ul{margin:8px 0;padding-left:22px}

  /* ai box */
  .ai-box{
    background:var(--surface-2);border-radius:6px;padding:13px 15px;margin-top:12px;
    border-left:2px solid var(--accent-dim);
  }
  .ai-box.err{border-left-color:var(--danger-dim)}
  .ai-box .ai-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1px;color:var(--text-2);margin-bottom:6px;display:flex;align-items:center;gap:6px}
  .ai-reflection{font-family:var(--serif);font-style:italic;color:var(--text);line-height:1.6}
  .spinner{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* charts */
  .chart-wrap{position:relative;height:180px}
  .chart-wrap.sm{height:54px}

  /* calendar */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal-head{font-size:11px;color:var(--text-2);text-align:center;padding:4px 0;letter-spacing:.5px}
  .cal-cell{
    aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;font-size:13px;position:relative;
    background:var(--surface-2);color:var(--text-2);cursor:pointer;transition:transform .08s;
  }
  .cal-cell:hover{transform:scale(1.05)}
  .cal-cell.empty{background:transparent;cursor:default}
  .cal-cell.today{outline:1.5px solid var(--text-2)}
  .cal-cell.period{background:rgba(196,122,122,.5);color:var(--text)}
  .cal-cell.predicted{background:rgba(196,122,122,.18);color:var(--danger)}
  .cal-cell.ovul{background:rgba(122,158,126,.42);color:var(--text)}
  .cal-cell.ovul-pred{background:rgba(122,158,126,.16);color:var(--accent)}
  .cal-cell.luteal:not(.period):not(.ovul){background:var(--surface-2)}
  .cal-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);position:absolute;bottom:5px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;font-size:12px;color:var(--text-2)}
  .legend span{display:flex;align-items:center;gap:6px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}

  /* goals tree */
  .goal-node{margin:6px 0}
  .goal-card{
    background:var(--surface-2);border-radius:6px;padding:11px 13px;
    display:flex;justify-content:space-between;gap:12px;align-items:flex-start;
  }
  .goal-card.done{opacity:.55}
  .goal-children{margin-left:20px;border-left:1px solid var(--line);padding-left:14px;margin-top:6px}
  .tier-tag{font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);font-weight:600}

  /* todos */
  .todo-item{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .todo-item:last-child{border-bottom:none}
  .cbx{width:18px;height:18px;border:1.5px solid var(--text-2);border-radius:4px;cursor:pointer;flex:0 0 18px;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
  .cbx.done{background:var(--accent);border-color:var(--accent);color:#15201a}
  .todo-item.done .ttl{text-decoration:line-through;color:var(--text-2)}
  .ttl{flex:1;min-width:0}
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tab{padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-2);background:var(--surface)}
  .tab.active{background:var(--surface-2);color:var(--text)}


  /* drag-drop todos */
  .todo-item[draggable]{cursor:grab}
  .todo-item[draggable]:active{cursor:grabbing}
  .todo-item.drag-over{border-top:2px solid var(--accent);margin-top:-2px}
  .todo-item.dragging{opacity:.4}
  .drag-handle{color:var(--text-2);cursor:grab;font-size:14px;padding:0 4px;flex:0 0 auto;user-select:none}
  .drag-handle:hover{color:var(--text)}

  /* mood log calendar */
  .mlog-toggle{display:flex;gap:6px;margin-bottom:14px}
  .mlog-toggle button{padding:5px 14px;border-radius:6px;border:1px solid var(--line);background:var(--surface);color:var(--text-2);cursor:pointer;font-size:13px}
  .mlog-toggle button.active{background:var(--surface-2);color:var(--text);border-color:var(--text-2)}
  .mlog-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .mlog-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .mlog-head{font-size:10px;color:var(--text-2);text-align:center;padding:3px 0;letter-spacing:.4px}
  .mlog-cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;background:var(--surface-2);color:var(--text-2);position:relative;cursor:default;transition:transform .08s;}
  .mlog-cell:hover{transform:scale(1.06)}
  .mlog-cell.empty{background:transparent}
  .mlog-cell.today-cell{outline:1.5px solid var(--text-2)}
  .mlog-cell .mlog-day{font-size:9px;color:var(--text-2);position:absolute;top:4px;left:0;right:0;text-align:center}
  .mlog-cell .mlog-score{font-family:var(--serif);font-size:14px;font-weight:500;margin-top:6px}
  .mlog-cell.s-high{background:rgba(122,158,126,.35);color:var(--text)}
  .mlog-cell.s-mid{background:rgba(185,163,106,.25);color:var(--text)}
  .mlog-cell.s-low{background:rgba(196,122,122,.3);color:var(--text)}
  [data-theme="light"] .mlog-cell.s-high{background:rgba(90,128,96,.2)}
  [data-theme="light"] .mlog-cell.s-mid{background:rgba(185,163,106,.2)}
  [data-theme="light"] .mlog-cell.s-low{background:rgba(176,80,80,.15)}
  [data-theme="sakura"] .mlog-cell.s-high{background:rgba(212,104,154,.18);color:var(--text)}
  [data-theme="sakura"] .mlog-cell.s-mid{background:rgba(185,140,163,.15);color:var(--text)}
  [data-theme="sakura"] .mlog-cell.s-low{background:rgba(192,72,72,.12);color:var(--text)}
  [data-theme="tiffany"] .mlog-cell.s-high{background:rgba(42,171,176,.2);color:var(--text)}
  [data-theme="tiffany"] .mlog-cell.s-mid{background:rgba(90,138,142,.15);color:var(--text)}
  [data-theme="tiffany"] .mlog-cell.s-low{background:rgba(192,72,72,.12);color:var(--text)}
  .mlog-legend{display:flex;gap:12px;margin-top:10px;font-size:11.5px;color:var(--text-2);flex-wrap:wrap}
  .mlog-legend span{display:flex;align-items:center;gap:5px}
  .mlog-legend .sw{width:10px;height:10px;border-radius:3px;display:inline-block}
  .mlog-cell.mlog-selected{outline:2px solid var(--accent);outline-offset:2px;transform:scale(1.08)}
  .theme-swatches{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  .theme-swatch{width:44px;height:44px;border-radius:8px;cursor:pointer;border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:10px;transition:border-color .12s,transform .1s;flex-direction:column;gap:3px;}
  .theme-swatch:hover{transform:scale(1.08)}
  .theme-swatch.active{border-color:var(--accent)}
  .theme-swatch .sw-a{width:14px;height:14px;border-radius:50%}
  .theme-swatch .sw-b{width:22px;height:6px;border-radius:3px}

  /* dashboard stat */
  .stat{background:var(--surface);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-2)}
  .stat .v{font-family:var(--serif);font-size:24px;margin-top:3px}
  .stat .v small{font-size:13px;color:var(--text-2);font-family:var(--ui)}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:18px}

  .empty{color:var(--text-2);font-style:italic;padding:18px 0;text-align:center}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(10,9,8,.72);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow:auto}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border-radius:12px;box-shadow:var(--shadow);width:100%;max-width:460px;padding:24px;animation:fade .2s}
  .modal h2{font-family:var(--serif);font-weight:500;margin:0 0 4px;font-size:20px}
  .modal .x{float:right;cursor:pointer;color:var(--text-2);font-size:20px;line-height:1;margin:-4px -4px 0 0}
  .modal .x:hover{color:var(--text)}

  /* toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-2);color:var(--text);padding:11px 20px;border-radius:8px;box-shadow:var(--shadow);opacity:0;transition:all .25s;z-index:80;font-size:14px;pointer-events:none;border:1px solid var(--line)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* mobile nav toggle */
  #navToggle{display:none}
  .conn-dot{width:7px;height:7px;border-radius:50%;background:var(--text-2);display:inline-block;margin-right:6px}
  .conn-dot.ok{background:var(--accent)}
  .conn-dot.bad{background:var(--danger)}

  @media (max-width:760px){
    #app{flex-direction:column}
    #sidebar{
      position:fixed;left:0;top:0;bottom:0;z-index:60;width:230px;flex-basis:230px;
      transform:translateX(-100%);transition:transform .22s;height:100vh;
    }
    #sidebar.open{transform:none;box-shadow:0 0 40px rgba(0,0,0,.5)}
    #navToggle{display:flex;position:fixed;top:12px;left:12px;z-index:40;
      background:var(--surface);border:1px solid var(--line);color:var(--text);
      width:40px;height:40px;border-radius:8px;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
    #main{padding:62px 16px 80px;max-width:100%}
    .grid2{grid-template-columns:1fr}
    #scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:55}
    #scrim.open{display:block}
  }
</style>
</head>
<body>
<div id="navToggle">☰</div>
<div id="scrim"></div>
<div id="app">
  <nav id="sidebar">
    <div class="brand">Quiet<small>a private space</small></div>
    <div class="nav-item" data-view="dashboard"><span class="ico">◑</span>Dashboard</div>
    <div class="nav-item" data-view="journal"><span class="ico">✎</span>Journal</div>
    <div class="nav-item" data-view="food"><span class="ico">◓</span>Food</div>
    <div class="nav-item" data-view="exercise"><span class="ico">⚡</span>Movement</div>
    <div class="nav-item" data-view="cycle"><span class="ico">○</span>Cycle</div>
    <div class="nav-item" data-view="relationships"><span class="ico">❀</span>People</div>
    <div class="nav-item" data-view="goals"><span class="ico">⤴</span>Goals</div>
    <div class="nav-item" data-view="todos"><span class="ico">✓</span>To-Do</div>
    <div class="nav-item" data-view="moodlog"><span class="ico">◉</span>Mood Log</div>
    <div class="nav-spacer"></div>
    <div class="nav-item subtle" id="openSettings"><span class="ico">⚙</span>Settings</div>

<script>
/* =========================================================================
   QUIET — local-first personal journal. All logic, vanilla JS.
   ========================================================================= */
"use strict";

/* ---------- storage layer ---------- */
const DEFAULTS = {
  journal_entries: [], food_logs: [], exercise_logs: [], cycle_logs: [],
  contacts: [], interactions: [], goals: [], todos: [],
  lms_base_url: "http://localhost:1234/v1", lms_model: "", lms_api_key: "",
  daily_insight: null, insight_history: [], theme: "warm-dark", todo_order: []
};
/* ── server sync layer ──────────────────────────────────────────────────────
   When served via server.py, all data lives in quiet-data.json on disk.
   store.set() writes to localStorage immediately (fast/sync) then queues
   a debounced save to the server. On boot, server data is loaded first.
   When opened as a plain file (no server), works purely from localStorage.
   ───────────────────────────────────────────────────────────────────────── */
const SERVER_URL = 'http://localhost:5000';
let _serverAvailable = false;
let _saveTimer = null;

const store = {
  get(k){
    try{ const r = localStorage.getItem(k); return r===null ? clone(DEFAULTS[k]) : JSON.parse(r); }
    catch(e){ return clone(DEFAULTS[k]); }
  },
  set(k,v){
    localStorage.setItem(k, JSON.stringify(v));
    if(_serverAvailable) _queueSave();
  },
};

function _queueSave(){
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(_saveToServer, 800);
}

async function _saveToServer(){
  try{
    const out = {}; DATA_KEYS.forEach(k => out[k] = store.get(k));
    out._saved = new Date().toISOString();
    await fetch(SERVER_URL + '/data', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(out)
    });
    _updateSyncStatus('saved');
  } catch(e){ _updateSyncStatus('error'); }
}

async function _loadFromServer(){
  try{
    const res = await fetch(SERVER_URL + '/data', {signal: AbortSignal.timeout(2000)});
    if(!res.ok) return false;
    const data = await res.json();
    if(data && typeof data === 'object'){
      DATA_KEYS.forEach(k=>{ if(k in data) localStorage.setItem(k, JSON.stringify(data[k])); });
    }
    return true;
  } catch(e){ return false; }
}

function _updateSyncStatus(state){
  const el = document.getElementById('syncStatus'); if(!el) return;
  if(state==='saved')    { el.textContent='✓ saved to file'; el.style.color='var(--accent)'; }
  else if(state==='live'){ el.textContent='● live'; el.style.color='var(--accent)'; }
  else if(state==='error'){ el.textContent='⚠ save failed'; el.style.color='var(--danger)'; }
  else                   { el.textContent='● local only'; el.style.color='var(--text-2)'; }
}
function clone(x){ return x===undefined?undefined:JSON.parse(JSON.stringify(x)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

/* ---------- date helpers (local time, YYYY-MM-DD) ---------- */
function todayStr(){ return toStr(new Date()); }
function toStr(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function fromStr(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function addDays(s,n){ const d=fromStr(s); d.setDate(d.getDate()+n); return toStr(d); }
function diffDays(a,b){ return Math.round((fromStr(b)-fromStr(a))/86400000); }
function prettyDate(s){
  const d=fromStr(s);
  return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
}
function prettyShort(s){ const d=fromStr(s); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---------- dot scale ---------- */
function dotScale(value, outOf, danger){
  // render 5 dots; value scaled from outOf to 5
  const filled = Math.round((value/outOf)*5);
  let h='<span class="dots">';
  for(let i=1;i<=5;i++) h+=`<span class="dot ${i<=filled?'on':''} ${danger?'danger':''}"></span>`;
  h+='</span>';
  return h;
}
function scoreLine(value, outOf, danger){
  return `<span class="scoreline">${dotScale(value,outOf,danger)}<span class="num">${value}<small class="muted">/${outOf}</small></span></span>`;
}

/* ---------- escape ---------- */
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* =========================================================================
   AI — LM Studio (OpenAI-compatible) calls
   ========================================================================= */
const AI = {
  baseUrl(){ return store.get('lms_base_url') || DEFAULTS.lms_base_url; },
  model(){ return store.get('lms_model') || ''; },
  apiKey(){ return store.get('lms_api_key') || ''; },

  headers(){
    const h = {'Content-Type':'application/json'};
    const key = this.apiKey();
    if(key) h['Authorization'] = 'Bearer ' + key;
    return h;
  },

  async chat(prompt){
    const body = { messages:[{role:'user',content:prompt}], max_tokens:1000, temperature:0.4 };
    const m = this.model(); if(m) body.model = m;
    const res = await fetch(this.baseUrl().replace(/\/$/,'') + '/chat/completions', {
      method:'POST', headers:this.headers(), body:JSON.stringify(body)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    return data.choices[0].message.content;
  },

  // expects JSON back; strips fences defensively
  async json(prompt){
    const raw = await this.chat(prompt + "\n\nReturn only valid JSON with no markdown fences, no explanation, no preamble.");
    return parseLoose(raw);
  },

  async test(baseUrl, apiKey){
    const h = {'Content-Type':'application/json'};
    if(apiKey) h['Authorization'] = 'Bearer ' + apiKey;
    const res = await fetch(baseUrl.replace(/\/$/,'')+'/models', {headers:h});
    if(!res.ok) throw new Error('HTTP '+res.status);
    return await res.json();
  }
};
function parseLoose(raw){
  if(raw==null) throw new Error('empty');
  let s = String(raw).trim();
  s = s.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();
  // grab first {...} or [...] block if extra text snuck in
  try{ return JSON.parse(s); }catch(e){}
  const m = s.match(/[\{\[][\s\S]*[\}\]]/);
  if(m){ return JSON.parse(m[0]); }
  throw new Error('unparseable');
}

/* helper: run an AI task into a target element with spinner + graceful fallback */
async function runAI(targetEl, label, fn){
  targetEl.className='ai-box';
  targetEl.innerHTML=`<div class="ai-label"><span class="spinner"></span> ${esc(label)}</div>`;
  try{
    const html = await fn();
    targetEl.className='ai-box';
    targetEl.innerHTML = html;
  }catch(e){
    targetEl.className='ai-box err';
    targetEl.innerHTML=`<div class="ai-label">${esc(label)}</div><div class="muted small">Analysis unavailable — check your connection settings, and make sure the server is running.</div>`;
  }
}

/* =========================================================================
   Chart helpers (Chart.js, minimal)
   ========================================================================= */
const charts = {};
function baseLineOpts(color){
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{enabled:true,backgroundColor:'#2D2A26',titleColor:'#E8E4DC',bodyColor:'#E8E4DC',borderColor:'#332F2A',borderWidth:1}},
    scales:{
      x:{grid:{display:false},ticks:{color:'#8C8880',font:{size:10},maxRotation:0,autoSkip:true,maxTicksLimit:6}},
      y:{grid:{display:false},ticks:{color:'#8C8880',font:{size:10}},beginAtZero:true}
    },
    elements:{point:{radius:0,hoverRadius:4},line:{tension:.35,borderWidth:2}}
  };
}
function makeChart(canvasId, cfg){
  if(charts[canvasId]){ charts[canvasId].destroy(); }
  const ctx = document.getElementById(canvasId);
  if(!ctx || typeof Chart==='undefined') return;
  charts[canvasId] = new Chart(ctx, cfg);
}
function sparkline(canvasId, labels, data, color){
  makeChart(canvasId,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:color,backgroundColor:'transparent',fill:false,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false}},elements:{point:{radius:0},line:{tension:.4,borderWidth:1.5}}}
  });
}

/* =========================================================================
   Router / navigation
   ========================================================================= */
const VIEWS = {};
function nav(view){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.view===view));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  const el = document.getElementById('view-'+view);
  if(el) el.classList.add('active');
  if(VIEWS[view]) VIEWS[view]();
  closeNav();
  window.scrollTo(0,0);
}
function closeNav(){ document.getElementById('sidebar').classList.remove('open'); document.getElementById('scrim').classList.remove('open'); }

document.querySelectorAll('.nav-item[data-view]').forEach(n=>{
  n.addEventListener('click',()=>nav(n.dataset.view));
});
document.getElementById('navToggle').addEventListener('click',()=>{
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('scrim').classList.toggle('open');
});
document.getElementById('scrim').addEventListener('click',closeNav);

/* =========================================================================
   SETTINGS modal + export/import
   ========================================================================= */
const sm = document.getElementById('settingsModal');
function openSettings(){
  document.getElementById('setBaseUrl').value = store.get('lms_base_url');
  document.getElementById('setModel').value = store.get('lms_model');
  document.getElementById('setApiKey').value = store.get('lms_api_key');
  document.getElementById('connResult').textContent='';
  applyTheme(store.get('theme'));
  _updateSyncStatus(_serverAvailable ? 'live' : 'local');
  updateStorageNote();
  sm.classList.add('open');
}
function closeSettings(){ sm.classList.remove('open'); }
document.getElementById('openSettings').addEventListener('click',openSettings);
document.getElementById('closeSettings').addEventListener('click',closeSettings);
sm.addEventListener('click',e=>{ if(e.target===sm) closeSettings(); });

document.getElementById('saveSettings').addEventListener('click',()=>{
  store.set('lms_base_url', document.getElementById('setBaseUrl').value.trim() || DEFAULTS.lms_base_url);
  store.set('lms_model', document.getElementById('setModel').value.trim());
  store.set('lms_api_key', document.getElementById('setApiKey').value.trim());
  toast('Settings saved'); closeSettings();
});

document.getElementById('testConn').addEventListener('click',async ()=>{
  const r=document.getElementById('connResult');
  const tmp = document.getElementById('setBaseUrl').value.trim() || DEFAULTS.lms_base_url;
  const key = document.getElementById('setApiKey').value.trim();
  r.innerHTML='<span class="spinner"></span> testing…';
  try{
    await AI.test(tmp, key);
    r.innerHTML='<span style="color:var(--accent)">✓ Connected</span>';
  }catch(e){
    r.innerHTML='<span style="color:var(--danger)">✗ Could not connect — check the URL, and make sure the server is running. If using Open WebUI, verify your API key.</span>';
  }
});

const DATA_KEYS = ['journal_entries','food_logs','exercise_logs','cycle_logs','contacts','interactions','goals','todos','lms_base_url','lms_model','lms_api_key','daily_insight','insight_history','theme','todo_order'];
document.getElementById('exportBtn').addEventListener('click',()=>{
  const out={}; DATA_KEYS.forEach(k=>out[k]=store.get(k));
  out._exported = new Date().toISOString();
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=`quiet-backup-${todayStr()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
  toast('Backup downloaded');
});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!confirm('Import will replace all current data. Continue?')) return;
      DATA_KEYS.forEach(k=>{ if(k in data) store.set(k,data[k]); });
      if(_serverAvailable) _saveToServer();
      toast('Data imported'); closeSettings(); rerenderAll();
    }catch(err){ alert('That file could not be read as a valid Quiet backup.'); }
  };
  reader.readAsText(file);
  e.target.value='';
});
document.getElementById('forceSaveBtn').addEventListener('click', async ()=>{
  if(!_serverAvailable){ toast('Server not running — start server.py first'); return; }
  await _saveToServer(); toast('Saved to quiet-data.json');
});
function updateStorageNote(){
  let bytes=0; DATA_KEYS.forEach(k=>{ const v=localStorage.getItem(k); if(v) bytes+=v.length; });
  const serverNote = _serverAvailable ? ' · auto-saving to quiet-data.json' : ' · server not running (local only)';
  document.getElementById('storageNote').textContent = `Using ~${(bytes/1024).toFixed(1)} KB of local storage${serverNote}.`;
}


/* ---------- theme ---------- */
const THEME_NAMES = {"warm-dark":"Warm Dark","light":"Light","cool-dark":"Cool Dark","forest":"Forest","sakura":"Sakura Pink","tiffany":"Tiffany Blue"};
function applyTheme(t){
  document.documentElement.setAttribute("data-theme", t||"warm-dark");
  store.set("theme", t||"warm-dark");
  document.querySelectorAll(".theme-swatch").forEach(s=>s.classList.toggle("active", s.dataset.theme===(t||"warm-dark")));
  const lbl=document.getElementById("themeLabel"); if(lbl) lbl.textContent=THEME_NAMES[t||"warm-dark"]||"";
}
document.addEventListener("click", e=>{
  const s=e.target.closest(".theme-swatch"); if(!s) return;
  applyTheme(s.dataset.theme);
});
/* re-render whichever view is active (and dashboard caches) */
function rerenderAll(){
  const active = document.querySelector('.nav-item.active');
  nav(active ? active.dataset.view : 'dashboard');
}

/* ---------- tiny DOM helpers ---------- */
function render(view, html){ document.getElementById('view-'+view).innerHTML = html; }
function $(sel,root){ return (root||document).querySelector(sel); }
function $$(sel,root){ return Array.from((root||document).querySelectorAll(sel)); }
function stripHtml(h){ const d=document.createElement('div'); d.innerHTML=h; return (d.textContent||'').trim(); }

/* last N day labels/keys */
function lastNDays(n){ const out=[]; for(let i=n-1;i>=0;i--) out.push(addDays(todayStr(),-i)); return out; }

/* =========================================================================
   1. JOURNAL
   ========================================================================= */
VIEWS.journal = function(){
  const entries = store.get('journal_entries').sort((a,b)=> b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
  const q = (window._journalQuery||'').toLowerCase();
  const shown = q ? entries.filter(e=> stripHtml(e.content).toLowerCase().includes(q) || (e.date.includes(q))) : entries;

  render('journal', `
    <h1 class="page">Journal</h1>
    <p class="page-sub">A quiet place to set the day down.</p>

    <div class="card">
      <div class="editor-toolbar">
        <button data-cmd="bold" title="Bold"><b>B</b></button>
        <button data-cmd="italic" title="Italic"><i>I</i></button>
        <button data-cmd="insertUnorderedList" title="Bullet list">•</button>
      </div>
      <div class="editor" id="jEditor" contenteditable="true" data-ph="What happened today, and how did it sit with you?"></div>
      <div class="field" style="margin-top:12px">
        <label class="fld">Date</label>
        <input type="date" id="jDate" value="${todayStr()}" style="max-width:200px">
      </div>
      <div class="btn-row"><button class="btn" id="jSave">Save entry</button></div>
    </div>

    <div class="card">
      <h3>Mood — last 30 days</h3>
      <div class="chart-wrap"><canvas id="moodChart"></canvas></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <h2 style="margin:0">Entries</h2>
        <input type="text" id="jSearch" placeholder="Search…" value="${esc(window._journalQuery||'')}" style="max-width:200px">
      </div>
      <div id="jList">${ shown.length ? shown.map(journalCard).join('') : '<div class="empty">No entries yet.</div>' }</div>
    </div>
  `);

  $$('.editor-toolbar button').forEach(b=> b.addEventListener('mousedown',e=>{ e.preventDefault(); document.execCommand(b.dataset.cmd,false,null); $('#jEditor').focus(); }));
  $('#jSave').addEventListener('click', saveJournal);
  const search=$('#jSearch');
  search.addEventListener('input',()=>{ window._journalQuery=search.value; clearTimeout(window._jt); window._jt=setTimeout(VIEWS.journal,250); });

  drawMoodChart();
  // re-attach AI for any unanalyzed entries
  shown.filter(e=>e.mood_score==null).forEach(e=> analyzeJournal(e.id));
};

function journalCard(e){
  const analysis = e.mood_score!=null
    ? `<div class="ai-box"><div class="ai-label">Reflection</div>
         <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
           ${scoreLine(e.mood_score,10)}
           <span class="pill ${sentimentClass(e.sentiment)}">${esc(e.sentiment||'')}</span>
         </div>
         <div class="ai-reflection">${esc(e.reflection||'')}</div></div>`
    : `<div class="ai-box" id="jai-${e.id}"><div class="ai-label"><span class="spinner"></span> analyzing…</div></div>`;
  return `<div class="list-item">
    <div class="entry-meta">
      <span>${prettyDate(e.date)}</span>
      <span data-jedit="${e.id}" style="cursor:pointer;color:var(--text-2);font-size:12px;margin-left:auto;padding-right:10px" title="Edit entry">✎ edit</span>
      <span class="del" data-del="${e.id}" style="cursor:pointer;color:var(--text-2)" title="Delete">✕</span>
    </div>
    <div class="entry-body">${e.content}</div>
    ${analysis}
  </div>`;
}
function sentimentClass(s){ return (s==='Thriving'||s==='Stable')?'accent':(s==='Depressed'?'danger':''); }

document.getElementById('view-journal').addEventListener('click',e=>{
  const d=e.target.closest('[data-del]'); if(d){ if(confirm('Delete this entry?')){ removeById('journal_entries',d.dataset.del); VIEWS.journal(); } return; }
  const ed=e.target.closest('[data-jedit]'); if(ed){ openJournalEdit(ed.dataset.jedit); }
});

function saveJournal(){
  const ed=$('#jEditor');
  const html=ed.innerHTML.trim();
  if(!html || stripHtml(html)===''){ toast('Write something first'); return; }
  const entry={ id:uid(), date:$('#jDate').value||todayStr(), content:html, mood_score:null, sentiment:null, reflection:null };
  const arr=store.get('journal_entries'); arr.push(entry); store.set('journal_entries',arr);
  ed.innerHTML=''; toast('Entry saved');
  VIEWS.journal();
}

function openJournalEdit(id){
  const arr=store.get('journal_entries');
  const e=arr.find(x=>x.id===id); if(!e) return;
  openModal(`
    <h2 style="font-family:var(--serif);font-weight:500">Edit entry</h2>
    <p class="muted small" style="margin-top:0">${prettyDate(e.date)}</p>
    <div class="field" style="max-width:200px"><label class="fld">Date</label><input type="date" id="jeDate" value="${e.date}"></div>
    <div class="editor-toolbar" style="margin-bottom:8px">
      <button data-cmd="bold"><b>B</b></button>
      <button data-cmd="italic"><i>I</i></button>
      <button data-cmd="insertUnorderedList">•</button>
    </div>
    <div class="editor" id="jeEditor" contenteditable="true" style="min-height:180px">${e.content}</div>

/* =========================================================================
   4. CYCLE TRACKER
   ========================================================================= */
const SYMPTOMS=['cramps','bloating','fatigue','mood swings','spotting','headache'];
let cycleMonth = new Date().getMonth(), cycleYear = new Date().getFullYear();
let cyclePendingSymptoms=new Set();

function cycleStats(){
  const logs=store.get('cycle_logs');
  const starts=[...new Set(logs.filter(l=>l.period_start).map(l=>l.date))].sort();
  const lengths=[]; for(let i=1;i<starts.length;i++) lengths.push(diffDays(starts[i-1],starts[i]));
  const valid=lengths.filter(x=>x>=18&&x<=45);
  const avg=valid.length? Math.round(valid.reduce((a,b)=>a+b,0)/valid.length):28;
  // period length
  const pls=[]; starts.forEach(s=>{ const end=logs.filter(l=>l.period_end&&l.date>=s&&diffDays(s,l.date)<=12).map(l=>l.date).sort()[0]; if(end) pls.push(diffDays(s,end)+1); });
  const periodLen=pls.length?Math.round(pls.reduce((a,b)=>a+b,0)/pls.length):5;
  const lastStart=starts.length?starts[starts.length-1]:null;
  const predNext=lastStart?addDays(lastStart,avg):null;
  const predOvul=predNext?addDays(predNext,-14):null;
  return {logs,starts,avg,periodLen,lastStart,predNext,predOvul};
}
// set of logged period dates
function periodDateSet(s){
  const set=new Set();
  s.starts.forEach(start=>{
    const end=s.logs.filter(l=>l.period_end&&l.date>=start&&diffDays(start,l.date)<=12).map(l=>l.date).sort()[0];
    const span = end? diffDays(start,end)+1 : s.periodLen;
    for(let i=0;i<span;i++) set.add(addDays(start,i));
  });
  // also include any date explicitly flagged with flow but not covered
  s.logs.filter(l=>l.flow).forEach(l=>set.add(l.date));
  return set;
}
function confirmedOvul(s){ return new Set(s.logs.filter(l=>l.ovulation).map(l=>l.date)); }

function phaseFor(dateStr,s,pset,ovset){
  if(pset.has(dateStr)) return 'period';
  if(ovset.has(dateStr)) return 'ovul';
  // predicted period window
  if(s.predNext){ const off=diffDays(s.predNext,dateStr); if(off>=0&&off<s.periodLen) return 'predicted'; }
  if(s.predOvul){ const off=Math.abs(diffDays(s.predOvul,dateStr)); if(off<=2) return 'ovul-pred'; }
  // luteal vs follicular relative to last start
  if(s.lastStart && dateStr>=s.lastStart){
    const ovDay=addDays(s.lastStart,s.avg-14);
    if(dateStr>=ovDay) return 'luteal';
    return 'follicular';
  }
  return '';
}
function currentPhaseLabel(){
  const s=cycleStats(); if(!s.lastStart) return '—';
  const t=todayStr(); const ph=phaseFor(t,s,periodDateSet(s),confirmedOvul(s));
  return ({period:'Menstrual',predicted:'Period (predicted)',ovul:'Ovulation',['ovul-pred']:'Fertile window',luteal:'Luteal',follicular:'Follicular'}[ph])||'—';
}

VIEWS.cycle=function(){
  const s=cycleStats();
  const pset=periodDateSet(s), ovset=confirmedOvul(s);
  render('cycle',`

    <div class="stat-grid">

      <div class="stat"><div class="k">Fertile window</div><div class="v" style="font-size:18px">${s.predOvul?prettyShort(addDays(s.predOvul,-2))+'–'+prettyShort(addDays(s.predOvul,2)):'—'}</div></div>

        <button class="btn ghost sm" id="cNext">›</button>
      </div>
      ${calendarHtml(s,pset,ovset)}
      <div class="legend">
        <span><span class="sw" style="background:rgba(196,122,122,.5)"></span>Period</span>
        <span><span class="sw" style="background:rgba(196,122,122,.18)"></span>Predicted</span>
        <span><span class="sw" style="background:rgba(122,158,126,.42)"></span>Ovulation</span>
        <span><span class="sw" style="background:rgba(122,158,126,.16)"></span>Fertile window</span>
      </div>
    </div>

    <div class="card">
      <h2>Log a day</h2>
      <div class="field" style="max-width:220px"><label class="fld">Date</label><input type="date" id="cDate" value="${todayStr()}"></div>
      <label class="fld">Mark</label>
      <div class="chips" style="margin-bottom:14px">
        <div class="chip" data-mark="period_start">Period start</div>

      </div>
      <label class="fld">Flow</label>
      <div class="chips" style="margin-bottom:14px">
        ${['light','medium','heavy'].map(f=>`<div class="chip" data-flow="${f}">${cap(f)}</div>`).join('')}
      </div>
      <label class="fld">Symptoms</label>
      <div class="chips" id="cSym" style="margin-bottom:16px">
        ${SYMPTOMS.map(x=>`<div class="chip" data-sym="${x}">${cap(x)}</div>`).join('')}
      </div>
      <div class="btn-row"><button class="btn" id="cSave">Save day</button></div>
    </div>

    <div class="card">
      <h2>History</h2>
      <div>${ s.logs.length? s.logs.slice().sort((a,b)=>b.date.localeCompare(a.date)).slice(0,40).map(cycleHistCard).join('') : '<div class="empty">No cycle data yet.</div>' }</div>
    </div>
  `);
  cyclePendingSymptoms=new Set();
  $('#cPrev').addEventListener('click',()=>{ cycleMonth--; if(cycleMonth<0){cycleMonth=11;cycleYear--;} VIEWS.cycle(); });
  $('#cNext').addEventListener('click',()=>{ cycleMonth++; if(cycleMonth>11){cycleMonth=0;cycleYear++;} VIEWS.cycle(); });
  $$('#view-cycle [data-mark]').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
  $$('#view-cycle [data-flow]').forEach(c=>c.addEventListener('click',()=>{ $$('#view-cycle [data-flow]').forEach(x=>x.classList.remove('on')); c.classList.add('on'); }));
  $$('#view-cycle [data-sym]').forEach(c=>c.addEventListener('click',()=>c.classList.toggle('on')));
  $('#cSave').addEventListener('click',saveCycle);
  $$('#view-cycle .cal-cell[data-d]').forEach(c=>c.addEventListener('click',()=>{ $('#cDate').value=c.dataset.d; $('#cDate').scrollIntoView({behavior:'smooth',block:'center'}); }));
};
function calendarHtml(s,pset,ovset){
  const first=new Date(cycleYear,cycleMonth,1);
  const startDow=first.getDay();
  const days=new Date(cycleYear,cycleMonth+1,0).getDate();
  let cells='';
  ['S','M','T','W','T','F','S'].forEach(d=>cells+=`<div class="cal-head">${d}</div>`);
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=toStr(new Date(cycleYear,cycleMonth,d));
    const ph=phaseFor(ds,s,pset,ovset);
    const today=ds===todayStr()?'today':'';
    cells+=`<div class="cal-cell ${ph} ${today}" data-d="${ds}">${d}</div>`;
  }
  return `<div class="cal-grid">${cells}</div>`;
}
function cycleHistCard(l){
  const marks=[l.period_start&&'Period start',l.period_end&&'Period end',l.ovulation&&'Ovulation'].filter(Boolean);
  return `<div class="list-item" style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start">
    <div><strong>${prettyDate(l.date)}</strong>
      <div style="margin-top:4px;display:flex;gap:6px;flex-wrap:wrap">
        ${marks.map(m=>`<span class="pill danger">${m}</span>`).join('')}
        ${l.flow?`<span class="pill">${cap(l.flow)} flow</span>`:''}
        ${(l.symptoms||[]).map(s=>`<span class="pill">${cap(s)}</span>`).join('')}
      </div></div>
    <span data-delc="${l.id}" style="cursor:pointer;color:var(--text-2)" title="Delete">✕</span>
  </div>`;

const REL_TYPES=['partner','family','friend','colleague','acquaintance','mentor'];
const INT_TYPES=['in-person','call','text','social media','email'];
const FREQ={weekly:7,monthly:30,quarterly:90,never:null};

function lastInteraction(contactId){
  const ints=store.get('interactions').filter(i=>i.contact_id===contactId).map(i=>i.date).sort();
  return ints.length?ints[ints.length-1]:null;
}
function isOverdue(c){
  const win=FREQ[c.check_in_frequency]; if(win==null) return false;
  const last=lastInteraction(c.id);
  if(!last) return true;
  return diffDays(last,todayStr())>win;
}
function communityScore(){
  const contacts=store.get('contacts').filter(c=>FREQ[c.check_in_frequency]!=null);
  if(!contacts.length) return null;
  const ok=contacts.filter(c=>!isOverdue(c)).length;
  return Math.round(ok/contacts.length*100);
}

function goalTreeHtml(active){
  const byParent={}; active.forEach(g=>{ (byParent[g.parent_id||'root']=byParent[g.parent_id||'root']||[]).push(g); });
  const tierIdx=g=>TIERS.indexOf(g.tier);
  function node(g){
    const kids=(byParent[g.id]||[]).sort((a,b)=>tierIdx(a)-tierIdx(b));
    return `<div class="goal-node">
      <div class="goal-card">
        <div style="flex:1">
          <span class="tier-tag">${g.tier}</span>
          <div style="font-size:15px;margin:2px 0">${esc(g.title)}</div>
          ${g.description?`<div class="muted small">${esc(g.description)}</div>`:''}
          ${g.target_date?`<div class="muted small">target ${prettyShort(g.target_date)}</div>`:''}
          ${g.status_note?`<div class="small" style="margin-top:5px;font-style:italic;color:var(--text)">“${esc(g.status_note)}” <span class="muted">· ${g.updated_date?prettyShort(g.updated_date):''}</span></div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;gap:5px;align-items:flex-end">
          <button class="btn sm ghost" data-gnote="${g.id}">Note</button>
          <button class="btn sm ghost" data-gdone="${g.id}">Done</button>
          <span data-delgoal="${g.id}" style="cursor:pointer;color:var(--text-2);font-size:13px">✕</span>
        </div>
      </div>
      ${kids.length?`<div class="goal-children">${kids.map(node).join('')}</div>`:''}
    </div>`;
  }
  // roots: no parent, OR parent not active/missing
  const activeIds=new Set(active.map(g=>g.id));
  const roots=active.filter(g=>!g.parent_id||!activeIds.has(g.parent_id)).sort((a,b)=>tierIdx(a)-tierIdx(b));
  return roots.map(node).join('');
}

  return list.slice().sort((a,b)=>{
    const ai = orderMap[a.id]??99999, bi = orderMap[b.id]??99999;
    return ai - bi;
  });
}

  openModal(`
    <h2 style="font-family:var(--serif);font-weight:500">Edit task</h2>
    <div class="field"><label class="fld">Title</label><input type="text" id="teTitle" value="${esc(t.title)}"></div>
    <div class="inline-fields">
      <div class="field"><label class="fld">Due date</label><input type="date" id="teDue" value="${t.due_date||''}"></div>
      <div class="field"><label class="fld">Priority</label>
        <select id="tePrio">
          <option value="" ${!t.priority?'selected':''}>—</option>
          <option value="high" ${t.priority==='high'?'selected':''}>High</option>
          <option value="medium" ${t.priority==='medium'?'selected':''}>Medium</option>
          <option value="low" ${t.priority==='low'?'selected':''}>Low</option>
        </select>
      </div>
    </div>
    <div class="field"><label class="fld">Linked goal</label>
      <select id="teGoal">
        <option value="" ${!t.goal_id?'selected':''}>— none —</option>
        ${goals.map(g=>`<option value="${g.id}" ${t.goal_id===g.id?'selected':''}>${esc(g.title)}</option>`).join('')}
      </select>
    </div>
    <div class="btn-row" style="margin-top:14px">
      <button class="btn" id="teSave">Save changes</button>
      <button class="btn ghost" id="teCancel">Cancel</button>
    </div>
  `);
  document.getElementById('teCancel').addEventListener('click', closeModal);
  document.getElementById('teSave').addEventListener('click',()=>{
    const title=document.getElementById('teTitle').value.trim();
    if(!title){ toast('Title cannot be empty'); return; }
    updateById('todos',id,x=>{
      x.title=title;
      x.due_date=document.getElementById('teDue').value||null;
      x.priority=document.getElementById('tePrio').value||null;
      x.goal_id=document.getElementById('teGoal').value||null;
    });
    closeModal(); toast('Task updated'); VIEWS.todos();
  });
}

function initTodoDrag(){
  let dragId=null;
  const list=$('#tList');
  if(!list) return;
  list.addEventListener('dragstart',e=>{
    const item=e.target.closest('.todo-item[draggable]'); if(!item) return;
    dragId=item.dataset.id; item.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
  });
  list.addEventListener('dragend',e=>{
    dragId=null;
    $$('.todo-item',list).forEach(el=>el.classList.remove('dragging','drag-over'));
  });
  list.addEventListener('dragover',e=>{
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    const item=e.target.closest('.todo-item[draggable]'); if(!item||item.dataset.id===dragId) return;
    $$('.todo-item',list).forEach(el=>el.classList.remove('drag-over'));
    item.classList.add('drag-over');
  });
  list.addEventListener('dragleave',e=>{
    const item=e.target.closest('.todo-item'); if(item) item.classList.remove('drag-over');
  });
  list.addEventListener('drop',e=>{
    e.preventDefault();
    const target=e.target.closest('.todo-item[draggable]');
    if(!target||!dragId||target.dataset.id===dragId) return;
    const items=$$('.todo-item[draggable]',list);
    const ids=items.map(el=>el.dataset.id);
    const fromIdx=ids.indexOf(dragId), toIdx=ids.indexOf(target.dataset.id);
    if(fromIdx<0||toIdx<0) return;
    ids.splice(fromIdx,1); ids.splice(toIdx,0,dragId);
    saveTodoOrder(ids);
    // Move DOM node for instant feedback, then re-render
    if(fromIdx<toIdx) target.after(list.querySelector(`[data-id="${dragId}"]`));
    else target.before(list.querySelector(`[data-id="${dragId}"]`));
    $$('.todo-item',list).forEach(el=>el.classList.remove('drag-over','dragging'));
  });
}

let dailyAutoTried=false;
VIEWS.dashboard=function(){
  const today=todayStr();
  const journal=store.get('journal_entries');
  const food=store.get('food_logs');
  const ex=store.get('exercise_logs');

  const todayMood=avgScore(journal.filter(e=>e.date===today&&e.mood_score!=null).map(e=>e.mood_score));
  const todayFood=avgScore(food.filter(l=>l.date===today&&l.health_score!=null).map(l=>l.health_score));
  const todayMin=ex.filter(l=>l.date===today).reduce((a,b)=>a+(+b.duration_minutes||0),0);
  const overdueCount=store.get('contacts').filter(isOverdue).length;
  const tasksToday=store.get('todos').filter(t=>!t.completed && t.due_date && t.due_date<=today).length;
  const phase=currentPhaseLabel();

  const di=store.get('daily_insight');
  const insightCached = di && di.date===today;

  render('dashboard',`
    <h1 class="page">${greeting()}</h1>
    <p class="page-sub">${new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}</p>

    <div class="stat-grid">
      <div class="stat"><div class="k">Mood</div><div class="v">${todayMood!=null?todayMood+' <small>/10</small>':'<small class="muted">—</small>'}</div></div>
      <div class="stat"><div class="k">Food</div><div class="v">${todayFood!=null?todayFood+' <small>/10</small>':'<small class="muted">—</small>'}</div></div>
      <div class="stat"><div class="k">Movement</div><div class="v">${todayMin} <small>min</small></div></div>
      <div class="stat"><div class="k">Cycle</div><div class="v" style="font-size:17px">${phase}</div></div>
      <div class="stat"><div class="k">Overdue people</div><div class="v">${overdueCount}</div></div>
      <div class="stat"><div class="k">Tasks today</div><div class="v">${tasksToday}</div></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <h2 style="margin:0">Daily reflection</h2>
        <button class="btn ghost sm" id="diBtn">${insightCached?'Refresh':'Generate'}</button>
      </div>
      <div class="ai-box" id="diBox" style="${insightCached?'':'display:none'}">${insightCached?`<div class="ai-reflection">${esc(di.insight)}</div>`:''}</div>
    </div>

    <div class="card">
      <h3>Last 14 days</h3>
      <div class="grid2" style="gap:14px">
        ${sparkBlock('Mood','spMood')}
        ${sparkBlock('Food','spFood')}
        ${sparkBlock('Movement (min)','spMove')}
        ${sparkBlock('Connection quality','spConn')}
      </div>
    </div>
  `);
  $('#diBtn').addEventListener('click',()=>genDailyInsight(true));
  // sparklines
  const days=lastNDays(14);
  sparkline('spMood',days,days.map(d=>avgScore(journal.filter(e=>e.date===d&&e.mood_score!=null).map(e=>e.mood_score))),'#7A9E7E');
  sparkline('spFood',days,days.map(d=>avgScore(food.filter(l=>l.date===d&&l.health_score!=null).map(l=>l.health_score))),'#7A9E7E');
  sparkline('spMove',days,days.map(d=>ex.filter(l=>l.date===d).reduce((a,b)=>a+(+b.duration_minutes||0),0)),'#7A9E7E');
  const ints=store.get('interactions');
  sparkline('spConn',days,days.map(d=>avgScore(ints.filter(i=>i.date===d).map(i=>i.quality_rating))),'#C47A7A');

  if(!insightCached && !dailyAutoTried && hasAnyData()){ dailyAutoTried=true; genDailyInsight(false); }
};
function sparkBlock(label,id){ return `<div><div class="muted small" style="margin-bottom:4px">${label}</div><div class="chart-wrap sm"><canvas id="${id}"></canvas></div></div>`; }
async function genDailyInsight(manual){
  const box=$('#diBox'); if(!box) return; box.style.display='block';
  await runAI(box, 'reflecting on your day…', async()=>{
    const today=todayStr();
    const j=store.get('journal_entries').filter(e=>e.date>=addDays(today,-7));
    const recentMood=avgScore(j.filter(e=>e.mood_score!=null).map(e=>e.mood_score));
    const food=avgScore(store.get('food_logs').filter(l=>l.date>=addDays(today,-7)&&l.health_score!=null).map(l=>l.health_score));
    const min7=store.get('exercise_logs').filter(l=>l.date>=addDays(today,-7)).reduce((a,b)=>a+(+b.duration_minutes||0),0);
    const overdue=store.get('contacts').filter(isOverdue).length;
    const openTasks=store.get('todos').filter(t=>!t.completed).length;
    const summary=`Recent 7-day snapshot — avg mood: ${recentMood??'n/a'}/10; avg food score: ${food??'n/a'}/10; total exercise: ${min7} min; relationships overdue: ${overdue}; open tasks: ${openTasks}. Cycle phase: ${currentPhaseLabel()}.`;
    const prompt=`You synthesize a person's wellbeing data into ONE grounded, specific insight (1-2 sentences) that connects across domains where there's a real signal. Avoid generic encouragement; only claim correlations the data hints at. JSON: {"insight":"..."}.\n\n${summary}`;
    const r=await AI.json(prompt);
    const insight=String(r.insight||'').slice(0,400);
    store.set('daily_insight',{date:today,insight});
    // persist to history (upsert by date)
    const hist=store.get('insight_history');
    const existing=hist.findIndex(x=>x.date===today);
    const todayMoodScore=avgScore(store.get('journal_entries').filter(e=>e.date===today&&e.mood_score!=null).map(e=>e.mood_score));
    const todayFoodScore=avgScore(store.get('food_logs').filter(l=>l.date===today&&l.health_score!=null).map(l=>l.health_score));
    const entry={date:today,insight,mood_score:todayMoodScore,food_score:todayFoodScore};
    if(existing>=0) hist[existing]=entry; else hist.push(entry);
    store.set('insight_history',hist);
    $('#diBtn').textContent='Refresh';
    return `<div class="ai-reflection">${esc(insight)}</div>`;
  });
}

/* =========================================================================

function cap(s){ return String(s||'').charAt(0).toUpperCase()+String(s||'').slice(1); }
function avgScore(arr){ return arr.length? +(arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : null; }
function removeById(key,id){ store.set(key, store.get(key).filter(x=>x.id!==id)); }
function updateById(key,id,fn){ const arr=store.get(key); const o=arr.find(x=>x.id===id); if(o){ fn(o); store.set(key,arr);} }
function greeting(){ const h=new Date().getHours(); return h<5?'Still up':h<12?'Good morning':h<18?'Good afternoon':'Good evening'; }
function hasAnyData(){ return ['journal_entries','food_logs','exercise_logs','interactions','contacts'].some(k=>store.get(k).length); }

/* modal helpers (generic, separate from settings) */
let genericModal;
function openModal(html){
  if(!genericModal){
    genericModal=document.createElement('div'); genericModal.className='modal-bg';
    genericModal.innerHTML='<div class="modal"><span class="x">✕</span><div class="mbody"></div></div>';
    document.body.appendChild(genericModal);
    genericModal.addEventListener('click',e=>{ if(e.target===genericModal) closeModal(); });
    genericModal.querySelector('.x').addEventListener('click',closeModal);
  }
  genericModal.querySelector('.mbody').innerHTML=html;
  genericModal.classList.add('open');
}
function closeModal(){ if(genericModal) genericModal.classList.remove('open'); }

/* =========================================================================
   9. MOOD LOG — calendar view of daily reflections
   ========================================================================= */
let mlogView='month'; // 'month' | 'week'
let mlogDate = new Date();

VIEWS.moodlog=function(){
  render('moodlog',`
    <h1 class="page">Mood Log</h1>
    <p class="page-sub">Your daily scores at a glance, color-coded and browsable.</p>
    <div class="card" id="mlogCard">
      <div class="mlog-toggle">
        <button class="${mlogView==='month'?'active':''}" id="mlogMonthBtn">Month</button>
        <button class="${mlogView==='week'?'active':''}" id="mlogWeekBtn">Week</button>
      </div>
      <div id="mlogInner"></div>
    </div>
    <div class="card" id="mlogFeed">
      <h2 style="font-family:var(--serif);font-weight:500;font-size:18px;margin:0 0 4px">Daily Reflections</h2><p class="muted small" style="margin:0 0 14px">Your overall day synthesis from the Dashboard, newest first.</p>
      <div id="mlogFeedBody"><div class="empty">No journal entries yet.</div></div>
    </div>
  `);
  $('#mlogMonthBtn').addEventListener('click',()=>{ mlogView='month'; VIEWS.moodlog(); });
  $('#mlogWeekBtn').addEventListener('click',()=>{ mlogView='week'; VIEWS.moodlog(); });
  renderMlogInner();
  renderMlogFeed();
};

function renderMlogInner(){
  if(mlogView==='month') renderMlogMonth();
  else renderMlogWeek();
}

function scoreClass(s){
  if(s==null) return '';
  if(s>=7) return 's-high';
  if(s>=4) return 's-mid';
  return 's-low';
}
function scoreColor(s){
  if(s==null) return 'var(--text-2)';
  if(s>=7) return 'var(--accent)';
  if(s>=4) return '#b9a36a';
  return 'var(--danger)';
}

function buildDayData(){
  const entries = store.get('journal_entries');
  const map = {};
  entries.forEach(e=>{
    if(!map[e.date]) map[e.date]={scores:[],reflections:[],sentiments:[]};
    if(e.mood_score!=null) map[e.date].scores.push(e.mood_score);
    if(e.reflection) map[e.date].reflections.push(e.reflection);
    if(e.sentiment) map[e.date].sentiments.push(e.sentiment);
  });
  return map;
}

function renderMlogMonth(){
  const inner = $('#mlogInner'); if(!inner) return;
  const y=mlogDate.getFullYear(), m=mlogDate.getMonth();
  const label = new Date(y,m,1).toLocaleDateString(undefined,{month:'long',year:'numeric'});
  const dayData = buildDayData();
  const first = new Date(y,m,1);
  const startDow = first.getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const today = todayStr();

  let cells = '';
  ['S','M','T','W','T','F','S'].forEach(d=>cells+=`<div class="mlog-head">${d}</div>`);
  for(let i=0;i<startDow;i++) cells+=`<div class="mlog-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds = toStr(new Date(y,m,d));
    const data = dayData[ds];
    const avg = data&&data.scores.length ? +(data.scores.reduce((a,b)=>a+b,0)/data.scores.length).toFixed(1) : null;
    const sc = scoreClass(avg);
    const isToday = ds===today ? 'today-cell' : '';
    cells+=`<div class="mlog-cell ${sc} ${isToday}" data-mlog="${ds}" title="${ds}">
      <span class="mlog-day">${d}</span>
      ${avg!=null?`<span class="mlog-score" style="color:${scoreColor(avg)}">${avg}</span>`:''}
    </div>`;
  }

  inner.innerHTML = `
    <div class="mlog-nav">
      <button class="btn ghost sm" id="mlogPrev">‹</button>
      <strong>${label}</strong>
      <button class="btn ghost sm" id="mlogNext">›</button>
    </div>
    <div class="mlog-grid">${cells}</div>
    <div class="mlog-legend">
      <span><span class="sw" style="background:rgba(122,158,126,.35)"></span>7–10 high</span>
      <span><span class="sw" style="background:rgba(185,163,106,.25)"></span>4–6 mid</span>
      <span><span class="sw" style="background:rgba(196,122,122,.3)"></span>1–3 low</span>
      <span><span class="sw" style="background:var(--surface-2)"></span>no entry</span>
    </div>
  `;
  $('#mlogPrev').addEventListener('click',()=>{ mlogDate=new Date(y,m-1,1); renderMlogInner(); });
  $('#mlogNext').addEventListener('click',()=>{ mlogDate=new Date(y,m+1,1); renderMlogInner(); });
  attachMlogCellClick();
}

function renderMlogWeek(){
  const inner = $('#mlogInner'); if(!inner) return;
  // show 4 weeks ending on the Sunday after mlogDate
  const dayData = buildDayData();
  const today = todayStr();
  const pivot = new Date(mlogDate);
  // find the most recent Sunday on or before pivot
  const dow = pivot.getDay();
  pivot.setDate(pivot.getDate() - dow);
  // go back to start of 4-week window
  const weekStart = new Date(pivot); weekStart.setDate(weekStart.getDate()-21);
  const label = `${weekStart.toLocaleDateString(undefined,{month:'short',day:'numeric'})} – ${pivot.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})}`;

  let rows='';
  for(let w=0;w<4;w++){
    const wStart = new Date(weekStart); wStart.setDate(wStart.getDate()+w*7);
    const wLabel = wStart.toLocaleDateString(undefined,{month:'short',day:'numeric'});
    let cells='';
    for(let d=0;d<7;d++){
      const day = new Date(wStart); day.setDate(day.getDate()+d);
      const ds = toStr(day);
      const data = dayData[ds];
      const avg = data&&data.scores.length ? +(data.scores.reduce((a,b)=>a+b,0)/data.scores.length).toFixed(1) : null;
      const sc = scoreClass(avg);
      const isToday = ds===today ? 'today-cell':'';
      cells+=`<div class="mlog-cell ${sc} ${isToday}" data-mlog="${ds}" title="${ds}">
        <span class="mlog-day">${day.getDate()}</span>
        ${avg!=null?`<span class="mlog-score" style="color:${scoreColor(avg)}">${avg}</span>`:''}
      </div>`;
    }
    rows+=`<div class="mlog-week-row"><div class="mlog-week-label">${wLabel}</div><div class="mlog-week-cells">${cells}</div></div>`;
  }

  inner.innerHTML=`
    <div class="mlog-nav">
      <button class="btn ghost sm" id="mlogPrev">‹ prev 4 weeks</button>
      <strong>${label}</strong>
      <button class="btn ghost sm" id="mlogNext">next 4 weeks ›</button>
    </div>
    <div style="margin-bottom:8px">
      <div style="display:flex;gap:4px;margin-left:84px;margin-bottom:2px">
        ${['S','M','T','W','T','F','S'].map(d=>`<div style="flex:1;font-size:10px;color:var(--text-2);text-align:center">${d}</div>`).join('')}
      </div>
      ${rows}
    </div>
    <div class="mlog-legend">
      <span><span class="sw" style="background:rgba(122,158,126,.35)"></span>7–10 high</span>
      <span><span class="sw" style="background:rgba(185,163,106,.25)"></span>4–6 mid</span>
      <span><span class="sw" style="background:rgba(196,122,122,.3)"></span>1–3 low</span>
    </div>
  `;
  $('#mlogPrev').addEventListener('click',()=>{ mlogDate=new Date(mlogDate); mlogDate.setDate(mlogDate.getDate()-28); renderMlogInner(); });
  $('#mlogNext').addEventListener('click',()=>{ mlogDate=new Date(mlogDate); mlogDate.setDate(mlogDate.getDate()+28); renderMlogInner(); });
  attachMlogCellClick();
}

function attachMlogCellClick(){
  $$('.mlog-cell[data-mlog]').forEach(c=>c.addEventListener('click',()=>{
    $$('.mlog-cell').forEach(x=>x.classList.remove('mlog-selected'));
    c.classList.add('mlog-selected');
    const feed=$('#mlogFeedBody');
    if(!feed) return;
    feed.scrollIntoView({behavior:'smooth',block:'nearest'});
    // highlight the matching entry in the feed
    const targetId='mlog-entry-'+c.dataset.mlog;
    const el=document.getElementById(targetId);
    if(el){
      el.style.outline='2px solid var(--accent)';
      el.style.outlineOffset='2px';
      setTimeout(()=>{ if(el){el.style.outline=''; el.style.outlineOffset='';} },1800);
      el.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
  }));
}

function renderMlogFeed(){
  const feed=$('#mlogFeedBody'); if(!feed) return;
  const hist=store.get('insight_history').slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(!hist.length){
    feed.innerHTML='<div class="empty">No daily reflections yet — generate one from the Dashboard to start building your log.</div>';
    return;
  }
  feed.innerHTML=hist.map(entry=>{
    const ms=entry.mood_score, fs=entry.food_score;
    return `<div id="mlog-entry-${entry.date}" style="padding:16px 0;border-bottom:1px solid var(--line);transition:outline .15s">
      <div style="display:flex;align-items:baseline;gap:12px;margin-bottom:10px;flex-wrap:wrap">
        <span style="font-family:var(--serif);font-size:13px;color:var(--text-2);flex:0 0 auto">${prettyDate(entry.date)}</span>
        ${ms!=null?`<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2)">mood <strong style="font-family:var(--serif);font-size:16px;color:${scoreColor(ms)}">${ms}</strong><small>/10</small></span>`:''}
        ${fs!=null?`<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-2)">food <strong style="font-family:var(--serif);font-size:16px;color:${scoreColor(fs)}">${fs}</strong><small>/10</small></span>`:''}
      </div>
      <div class="ai-reflection" style="font-family:var(--serif);font-style:italic;color:var(--text);line-height:1.7;font-size:15px">${esc(entry.insight)}</div>
    </div>`;
  }).join('');
}

function firstRun(){ return localStorage.getItem('lms_base_url')===null && !hasAnyData(); }
(async function boot(){
  // try loading from server first; fall back to localStorage if unavailable
  const loaded = await _loadFromServer();
  _serverAvailable = loaded;
  _updateSyncStatus(loaded ? 'live' : 'local');

  if(localStorage.getItem('lms_base_url')===null) store.set('lms_base_url',DEFAULTS.lms_base_url);
  applyTheme(store.get("theme") || "warm-dark");
  nav('dashboard');
  if(firstRun() || localStorage.getItem('_seen')===null){
    localStorage.setItem('_seen','1');
    setTimeout(openSettings,400);
  }
})();
